name: Generate Blog Post

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8am UTC
    - cron: '0 8 * * 4'  # Thursday 8am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_FEED_API_KEY: ${{ secrets.BLOG_FEED_API_KEY }}
        run: python scripts/generate_post.py

      - name: Notify IndexNow
        if: success()
        run: |
          NEW_FILE=$(git diff --name-only HEAD~1 HEAD -- 'src/content/' | head -1)
          if [ -n "$NEW_FILE" ]; then
            SLUG=$(basename "$NEW_FILE" .md)
            curl -s -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"host\":\"litrpgcritic.com\",\"key\":\"lrc8f3a1d7e2b9c4\",\"urlList\":[\"https://litrpgcritic.com/blog/${SLUG}/\",\"https://litrpgcritic.com/blog/\",\"https://litrpgcritic.com/sitemap-index.xml\"]}" || true
          fi
