name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # Mon/Wed/Fri at 10am UTC (for scheduled content releases)
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          BLOG_FEED_API_KEY: ${{ secrets.BLOG_FEED_API_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=litrpgcritic

      - name: Notify IndexNow
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host":"litrpgcritic.com","key":"lrc8f3a1d7e2b9c4","urlList":["https://litrpgcritic.com/","https://litrpgcritic.com/lists/","https://litrpgcritic.com/new-releases/","https://litrpgcritic.com/blog/","https://litrpgcritic.com/sitemap-index.xml"]}' || true
